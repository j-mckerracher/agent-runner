  domain_context: 'This is an Angular/TypeScript Nx monorepo (mcs-products-mono-ui)
    for RLS (Reference Lab System) frontend applications. The library code is organized
    into three main domains: pearls_features (clinical lab features including specimen
    accessioning, sendouts, auto-accession, order system viewer, and HL7 admin), shared_libraries
    (shared UI components, data access services, state management, core utilities,
    and testing helpers), and product_catalog (product viewer and product details
    features). Synthetic stories should ask the agent to implement realistic front-end
    engineering tasks such as adding Angular components, updating NgRx state and effects,
    extending data access services, wiring up new routes, or improving shared UI pattern
    library elements — spanning the relevant feature and shared layers.

    '
