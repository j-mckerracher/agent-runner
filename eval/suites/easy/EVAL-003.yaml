story_id: EVAL-003
title: "Add isTimeoutError utility to ErrorUtils"
description: >
  Add a new public static method `isTimeoutError` to the `ErrorUtils` class in
  `libs/shared/core/src/lib/utils/error.utils.ts`. The method should accept an
  `unknown` error parameter and return a `boolean`. It must return `true` when:
  
  - The error is an `HttpErrorResponse` with status 0 (network cancelled / timeout)
  - The error is an Error instance whose name includes 'Timeout' or 'Abort' (case-insensitive)
  - The error is an object with a `name` property matching the same pattern
  
  For all other cases it returns `false`.
  
  Add JSDoc for the new method following the existing style in the file. Do not
  modify any existing methods.
change_id: EVAL-003
suite_tier: easy
dataset_id: mcs-products-mono-ui
