change_id: PR-468504
title: Update api to have graceful shutdown
description: |-
  Update all APIs to have a graceful shutdown.
acceptance_criteria:
  AC1: rls-orders-cnsmr-api and rls-docgen-system-api implement graceful shutdown behavior appropriate for the Cloud Run container lifecycle on .NET 8/alpine.
  AC2: When the container receives SIGTERM, each API uses host lifetime shutdown handling to stop taking new work and allow in-flight requests or processing to complete or cancel cleanly before process exit.
  AC3: Each API flushes Serilog sinks during shutdown and the shutdown path completes without introducing unhandled exceptions or abrupt process termination.
  AC4: The work item or implementation notes clearly identify any additional APIs that still need the same graceful shutdown pattern, including the currently out-of-scope follow-up for rls-orders-orch-api and rls-orders-data-api.
  AC5: No regressions introduced.
examples:
  - source: user_additional_context
    summary: Propagate the cancellation token in rls-orders-cnsmr-api to the same depth as the completed pattern in rls-docgen-system-api PR 468504.
  - source: referenced_pull_request
    repository: rls-docgen-system-api
    pull_request_id: 468504
    title: Graceful Shutdown
    pattern_details:
      - pass CancellationToken from DocumentsController into DocumentBll
      - propagate cancellation through validator and composer calls
      - thread cancellation through document components and BarcodeHelper without changing QuestPDF framework signatures
      - add cooperative cancellation checks at key composition boundaries
constraints:
  - Brownfield change against existing APIs; the target code repository for this workflow is /Users/mckerracher.joshua/Code/rls-orders-cnsmr-api.
  - The source work item spans multiple APIs, but this intake is scoped to the runner-supplied target repo while preserving the linked rls-docgen-system-api PR as an implementation example.
  - Out-of-scope follow-up remains for rls-orders-orch-api and rls-orders-data-api, as explicitly called out in AC4.
  - The shutdown path must avoid unhandled exceptions and abrupt termination while preserving Serilog flushing behavior.
non_functional_requirements:
  - Appropriate for the Cloud Run container lifecycle on .NET 8/alpine.
  - Stop taking new work on SIGTERM.
  - Allow in-flight requests or processing to complete or cancel cleanly before process exit.
  - Flush Serilog sinks during shutdown.
  - No regressions introduced.
