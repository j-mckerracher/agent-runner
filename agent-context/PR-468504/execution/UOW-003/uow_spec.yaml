summary: >-
  Extend the graceful-shutdown cancellation pattern into the remaining in-scope
  secondary endpoint families for rls-orders-cnsmr-api: Accounts, Labels,
  Documents, and Reports.
definition_of_done:
  - "Secondary controller and service chains in scope follow the same shutdown-aware cancellation pattern established in the core paths."
  - "Shared abstractions that block token propagation are either updated in scope or clearly captured as implementation risks."
  - "No scoped endpoint path is left bypassing the selected graceful-shutdown strategy."
  - "Regression-focused automated coverage is updated for the additional changed paths."
implementation_hints:
  - "Propagate CancellationToken from AccountsController, LabelsController, DocumentsController, and ReportsController through their service contracts."
  - "Carry the token to DataverseService, LabelService, DocumentService, ReportService, DataverseRepository, DocgenRepository, and the OrdersRepository call used by ReportService."
  - "Where shared helpers do not expose CancellationToken overloads, use cooperative cancellation checks and cancellation-aware waits at the repository boundary."
  - "Keep changes scoped to rls-orders-cnsmr-api; out-of-scope follow-up APIs remain for UOW-004 documentation."
