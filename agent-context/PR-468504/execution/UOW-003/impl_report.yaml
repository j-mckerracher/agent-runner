risks_identified:
  - type: "regression_risk"
    description: "The shared IHttpClientHelper abstraction still has no explicit CancellationToken overload in this repo, so cancellation relies on cooperative waiting at the repository boundary instead of canceling the inner transport directly."
    mitigation: "Repository token-aware overloads now use `ThrowIfCancellationRequested`, `WaitAsync`, and cancellation-aware content reads to stop waiting cleanly when shutdown/request cancellation begins."
    requires_escalation: false
  - type: "tech_debt"
    description: "The report signed-url path still depends on a synchronous IGoogleCloudStorageService call that cannot be canceled mid-invocation."
    mitigation: "ReportService now checks cancellation immediately before signing and documents the abstraction limit for follow-up work."
    requires_escalation: false
