regression_risk_assessment:
  overall_risk: medium
  risk_areas:
    - area: Test Suite Correctness
      risk_level: medium
      rationale: |
        UOW-003 impl_report claims "39/39 tests pass" but pytest shows 10 failures.
        UOW-004 impl_report claims "25/25 tests pass" but pytest shows 10 failures in downstream tests.
        These are artifact schema naming discrepancies (project_type field location, raw_input field names),
        not functional failures. However, test expectations don't match actual artifact structure,
        which could mask real issues in future iterations.
      mitigation: |
        1. Review test expectations against actual artifact schema
        2. Update test assertions to match actual field names in config.yaml and story.yaml
        3. Document the schema differences (run_metadata.source_type vs top-level project_type)
        4. Re-run full test suite after schema clarification

    - area: Fixture Field Naming Consistency
      risk_level: low
      rationale: |
        raw_input section uses 'source' and 'fixture_content' keys, but some tests expect
        'fixture_path' and 'original_fixture'. This doesn't affect functionality but could
        confuse downstream consumers of the artifacts.
      mitigation: |
        Document actual field names in constraints.md and README.md
        Ensure downstream agents understand the actual schema they receive

    - area: Project Type Marker Location
      risk_level: low
      rationale: |
        Tests expect project_type='synthetic-fixture' at top level of config.yaml, but
        synthetic markers are in run_metadata.source_type and run_metadata.fixture_path instead.
        Downstream stages need to detect synthetic mode correctly despite this difference.
      mitigation: |
        Verify that downstream agents correctly detect synthetic mode via:
        1. config.yaml run_metadata.source_type='synthetic_fixture', or
        2. story.yaml absence of ado_provenance
        Both detection paths are tested and working (19/25 related tests pass).

    - area: Documentation vs Implementation Alignment
      risk_level: medium
      rationale: |
        README.md documents project_type: 'synthetic-fixture' marker (line 59),
        but actual config.yaml has project_type: 'python-cli' with synthetic indicators in run_metadata.
        This could confuse users following the documentation.
      mitigation: |
        Update README.md to document actual field structure (run_metadata.source_type)
        or clarify that synthetic detection uses multiple markers

issues_found:
  - issue_id: TEST-001-IMPL-REPORT-MISMATCH
    type: test_assertion_error
    severity: high
    description: |
      Implementation reports (UOW-003, UOW-004) claim 100% test pass rates, but actual test
      execution shows 10 failures in test_intake_artifacts.py and test_downstream_synthetic_mode.py.

      Failed tests:
      - test_config_project_type_synthetic (expects 'synthetic-fixture' but finds 'python-cli')
      - test_fixture_path_documented (expects fixture_path in raw_input but finds it elsewhere)
      - test_raw_input_preservation (expects source_type key but finds source key)
      - 7 other downstream synthetic mode detection tests expecting project_type marker

    reproduction_steps: |
      1. Run: python -m pytest tests/test_intake_artifacts.py -v
      2. Expected: All tests pass (as claimed in UOW-003 report)
      3. Actual: 3 tests fail in SyntheticIntakeArtifactsTests

      Run: python -m pytest tests/test_downstream_synthetic_mode.py -v
      Expected: All tests pass (as claimed in UOW-004 report)
      Actual: 7 tests fail in various test classes

    expected_behavior: |
      Implementation reports should accurately reflect test execution results.
      All DoD items should be verified against actual test output, not assumed to pass.

    actual_behavior: |
      Test assertions were written to expect specific field names/locations in artifacts
      (project_type at top level, fixture_path in raw_input), but intake agent created
      artifacts with slightly different schema (project_type='python-cli', synthetic markers
      in run_metadata). Tests fail but implementation report claims 100% pass rate.

    affected_ac:
      - AC2
      - AC3

    recommended_action: |
      1. IMMEDIATE: Fix test assertions to match actual artifact structure
         - Update test_config_project_type_synthetic to check run_metadata.source_type
         - Update test_fixture_path_documented to check run_metadata.fixture_path
         - Update test_raw_input_preservation to expect actual field names

      2. Verify that downstream agents correctly detect synthetic mode using actual markers:
         - config.yaml run_metadata.source_type='synthetic_fixture'
         - config.yaml run_metadata.fixture_path
         - story.yaml absence of ado_provenance (already verified)

      3. Update README.md to document actual artifact field structure

      4. Re-run full test suite after fixes to establish baseline

    requires_escalation: false
    remediation_type: test_assertion_fix
    remediation_complexity: simple

  - issue_id: TEST-002-SCHEMA-DOCUMENTATION
    type: spec_ambiguity
    severity: medium
    description: |
      Documentation (README.md) references project_type: 'synthetic-fixture' as the synthetic
      mode marker (line 59), but actual config.yaml has project_type: 'python-cli' with
      synthetic indicators in run_metadata fields instead.

      This creates confusion for users and downstream developers trying to detect synthetic mode.

    reproduction_steps: |
      1. Read README.md line 59: "Intake artifacts tagged with `project_type: 'synthetic-fixture'`"
      2. Check actual config.yaml: project_type is 'python-cli'
      3. Observe mismatch between documentation and implementation

    expected_behavior: |
      Documentation should accurately reflect actual artifact structure.
      If synthetic detection uses run_metadata.source_type, documentation should show that.

    actual_behavior: |
      Documentation shows one marker (project_type: 'synthetic-fixture') but actual artifacts
      use different markers (run_metadata.source_type and run_metadata.fixture_path).

    affected_ac:
      - AC3

    recommended_action: |
      1. Update README.md to document actual synthetic mode detection markers:
         - Primary: config.yaml run_metadata.source_type='synthetic_fixture'
         - Primary: config.yaml run_metadata.fixture_path
         - Secondary: story.yaml absence of ado_provenance

      2. Clarify that downstream agents should check run_metadata for synthetic mode

      3. Update any examples to show actual field names and locations

    requires_escalation: false
    remediation_type: documentation_update
    remediation_complexity: simple

