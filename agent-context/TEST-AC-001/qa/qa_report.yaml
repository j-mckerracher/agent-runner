librarian_queries:
  - query: "What is the synthetic workflow architecture and how does it differ from ADO mode?"
    confidence_received: full
    answer_summary: |
      The agent-runner supports two modes: synthetic (local JSON fixtures) and ADO (live work items).
      Synthetic mode uses load_story_fixture() for validation, resolve_workflow_input() for routing,
      and build_intake_prompt() for stage-specific instructions. Downstream stages detect synthetic
      mode via config.yaml project_type marker or absence of ado_provenance metadata.

  - query: "What canonical artifacts should intake stage produce for synthetic fixtures?"
    confidence_received: full
    answer_summary: |
      Three artifacts: story.yaml (normalized story with keyed AC format), config.yaml (project metadata),
      constraints.md (context and requirements). All preserve raw fixture contents and mark synthetic mode
      via project_type field or metadata structure.

