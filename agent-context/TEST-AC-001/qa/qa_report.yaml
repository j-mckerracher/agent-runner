release_notes: |
  ## Synthetic Workflow Smoke Test (TEST-AC-001)

  ### User-Facing Changes
  - Agent-runner now supports local synthetic story fixtures via --story-file argument
  - Default bundled synthetic_story.json enables offline testing without Azure DevOps
  - Workflow processes synthetic fixtures through all 6 stages (intake → planning → assignment → implementation → QA → lessons-optimization)
  - Full workflow execution requires no Azure CLI, credentials, or network access

  ### Breaking Changes
  None. This is a new feature for offline testing that does not affect existing ADO mode workflows.

  ### Known Limitations
  1. Synthetic mode detection uses config.yaml run_metadata.source_type rather than top-level project_type field
  2. Field names in raw_input section use 'source' and 'fixture_content' rather than alternative naming conventions
  3. Test assertions may need updates in downstream projects expecting specific field names

  ### Technical Details
  - Synthetic fixtures are validated via load_story_fixture() with comprehensive error handling
  - Intake stage normalizes acceptance_criteria to keyed format (AC1, AC2, AC3)
  - Raw fixture content is preserved in story.yaml raw_input section for traceability
  - Downstream stages detect synthetic mode via config.yaml run_metadata or story.yaml absence of ado_provenance

