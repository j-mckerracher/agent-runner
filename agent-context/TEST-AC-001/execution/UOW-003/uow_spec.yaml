rationale: |
  Verify intake agent creates canonical artifacts for synthetic stories—critical gate for AC2 and AC3.
  Depends on T1 (validation) and T2 (routing). Exercises intake agent behavior with synthetic prompt.
  Complexity: moderate. High risk: intake agent behavior is not yet verified.

description: |
  The intake stage receives a synthetic-specific prompt from build_intake_prompt() in steps.py.
  This UoW verifies the intake agent correctly:
  1. Reads the synthetic_story.json fixture from the provided path
  2. Normalizes acceptance criteria from list form (AC1..AC3) to keyed YAML format
  3. Creates three canonical artifacts: story.yaml, config.yaml, constraints.md
  4. Preserves the raw fixture JSON under raw_input section
  5. Sets project_type to "synthetic-fixture" in config.yaml
  6. Skips all ADO-specific operations (no azure-devops-cli calls)

  Verify that intake artifacts generated by the intake agent match the expected schema
  and correctly preserve the fixture contents while normalizing format.

acceptance_criteria_mapped:
  - AC2
  - AC3

definition_of_done:
  - title: "Intake agent successfully processes synthetic_story.json fixture"
    description: "Manual invocation or agent test confirms intake agent can process the synthetic story without errors"

  - title: "Output artifacts created: story.yaml with keyed AC1/AC2/AC3 format"
    description: "Intake produces story.yaml in agent-context/TEST-AC-001/intake/ with acceptance_criteria keyed as AC1, AC2, AC3"

  - title: "Output artifacts created: config.yaml with project_type='synthetic-fixture'"
    description: "Intake produces config.yaml with project_type='synthetic-fixture' and normalized fields (story_id, change_id, etc.)"

  - title: "Output artifacts created: constraints.md documenting raw_input preservation"
    description: "Intake produces constraints.md documenting the synthetic nature, raw input preservation, and NoADO requirement"

  - title: "Raw fixture JSON is preserved under raw_input section"
    description: "story.yaml contains raw_input field with original_fixture containing the complete JSON from synthetic_story.json"

  - title: "No azure-devops-cli commands invoked during synthetic intake"
    description: "Agent execution log or test verification confirms zero ADO API calls were made"

  - title: "Artifacts validated against canonical schema"
    description: |
      All required fields present and correctly typed:
      - story.yaml: change_id, title, description, acceptance_criteria (keyed), constraints, examples, non_functional_requirements, raw_input, metacognitive_context
      - config.yaml: story_id, project_type, change_id (matches story_id), and metadata
      - constraints.md: readable documentation of fixture-based nature and synthetic mode behavior

  - title: "Acceptance criteria normalized from list form to keyed form"
    description: "AC1, AC2, AC3 are present as keys in story.yaml acceptance_criteria section, preserving original text"

