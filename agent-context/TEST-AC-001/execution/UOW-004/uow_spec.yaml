  - title: "Software engineer stage detects synthetic mode and skips ADO work-item updates"
    description: "Inspection of software-engineer stage code confirms conditional skip of ADO status updates for synthetic artifacts"

  - title: "QA stage operates without requiring Azure AD authentication or ADO connectivity"
    description: "QA tests can run in isolated environment without ADO credentials"

  - title: "All downstream stage skip logic is tested via unit tests (mocked ADO calls)"
    description: "Each downstream stage has unit tests with mocked ADO API calls confirming correct branching"

  - title: "Integration test confirms no external ADO API calls are made in synthetic mode"
    description: "Full workflow run with synthetic fixture produces no real ADO API calls (verified by network trace or mock assertion)"

  - title: "Clear error message if ADO integration is accidentally triggered in synthetic mode"
    description: "If a downstream stage attempts ADO operations in synthetic mode, error message clearly identifies the synthetic constraint violation"

