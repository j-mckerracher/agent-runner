rationale: |
  Verify downstream stages skip ADO operations for synthetic artifacts—required for AC3 verification.
  Depends on T3 (intake artifacts). Tests task-gen, task-assigner, software-engineer, and QA stage behavior.
  Complexity: moderate. High risk: downstream stage synthetic mode detection is not yet verified.

description: |
  Downstream stages (task-gen, task-assigner, software-engineer, QA) must correctly detect
  synthetic mode and skip ADO-specific operations. This UoW verifies:

  1. Task generator reads config.yaml and detects project_type="synthetic-fixture"
  2. Task generator skips all ADO-specific operations (no work-item writes)
  3. Task assigner does not attempt to write assignments back to ADO
  4. Software engineer does not attempt ADO work-item status updates
  5. QA stage does not require ADO connectivity

  Verify that all downstream stages handle the absence of ado_provenance metadata and
  proceed with local-only workflow execution. This is critical for AC3 verification.

acceptance_criteria_mapped:
  - AC3

