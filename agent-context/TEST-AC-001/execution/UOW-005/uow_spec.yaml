uow_id: "UOW-005"
story_id: "TEST-AC-001"
source_task_id: "T5"
title: "Add comprehensive integration test for full synthetic workflow"

description: |
  Create or enhance test_steps_and_run.py to run the full workflow with synthetic_story.json
  and verify:
  1. All stages complete successfully (intake → planning → assignment → implementation → QA)
  2. Canonical artifacts are created correctly at each stage
  3. No external dependencies (Azure, ADO) are required
  4. Workflow output matches expected structure
  5. Error handling works correctly for malformed inputs

  This provides a repeatable test harness to verify AC1, AC2, AC3 are met and prevents
  regression if the workflow is modified. It serves as end-to-end validation that all stages
  work correctly together in synthetic mode.

acceptance_criteria_mapped:
  - AC1: "The workflow can start from a local synthetic story fixture (--story-file or bundled default)"
  - AC2: "The intake stage preserves the raw synthetic story input in canonical artifacts"
  - AC3: "ADO-specific actions are skipped when processing synthetic fixtures"

dependencies:
  - T1
  - T2
  - T3

implementation_hints:
  - "file: tests/test_steps_and_run.py — add or enhance test_full_synthetic_workflow() method"
  - "Create fixtures in test-fixtures/ for testing malformed inputs if needed"
  - "Verify artifact chain: story.yaml → config.yaml → constraints.md at each stage"
  - "Use mocking to verify no ADO API calls are made (network tracing optional)"
  - "Focus on clear error messages and diagnostics when tests fail"
  - "Verify all three acceptance criteria (AC1, AC2, AC3) are covered by test assertions"

definition_of_done:
  - "Integration test test_full_synthetic_workflow() added to test_steps_and_run.py (or enhanced in existing test)"
  - "Test runs all workflow stages (intake → planning → assignment → implementation → QA)"
  - "Test verifies artifact creation at each stage matches expected schema"
  - "Test confirms no Azure DevOps or external API calls are made"
  - "Test runs with pytest and passes without environment variables (no ADO PAT needed)"
  - "Test includes assertions on artifact content and structure (story.yaml, config.yaml, constraints.md)"
  - "Test failure provides clear diagnostics (which stage failed, what artifact was wrong)"
  - "Test coverage: verifies all three AC1, AC2, AC3 conditions are met in end-to-end execution"

priority: "high"
complexity: "moderate"

notes: |
  Context from prior UoWs:
  - UOW-001: Fixture validation verified and documented
  - UOW-002: Workflow routing fixed and tested (run.py routing logic works correctly)
  - UOW-003: Intake agent confirmed to create canonical artifacts (story.yaml, config.yaml, constraints.md)
  - UOW-004: Downstream stages verified to detect synthetic mode and skip ADO operations

  This UoW integrates all prior verification into an end-to-end test that exercises the full
  workflow from start to finish, serving as the final gate for AC1, AC2, AC3 acceptance.

  The test should:
  1. Use the bundled synthetic_story.json or explicitly load it with --story-file
  2. Execute run.py with synthetic mode (no ADO credentials needed)
  3. Verify artifacts at each stage (intake, planning, assignment, implementation, QA)
  4. Assert no ADO API calls were made
  5. Validate artifact content against expected schema
  6. Provide clear error messages if any stage fails

  Integration test execution path:
  - run.py (entry point with --story-file or default)
  - → step_intake() (creates story.yaml, config.yaml, constraints.md)
  - → step_planning() (creates tasks.yaml from story)
  - → step_assignment() (creates assignments.json from tasks)
  - → step_implementation() (would create impl_report.yaml for each UoW)
  - → step_qa() (validates all artifacts against expected schema)
