implementation_summary: |
  Enhanced test_steps_and_run.py with a comprehensive end-to-end integration test
  (test_full_synthetic_workflow_end_to_end) that exercises the complete workflow pipeline:
  intake → task-gen → assignment → implementation → QA → lessons-optimizer.

  The integration test:
  1. Creates canonical artifacts at each stage (story.yaml, config.yaml, constraints.md,
     tasks.yaml, assignments.json, impl_report.yaml for each UoW, qa_report.yaml)
  2. Verifies artifact schemas and required fields at each stage
  3. Confirms synthetic mode markers prevent ADO API calls (project_type='synthetic-fixture',
     absence of ado_provenance)
  4. Validates all three acceptance criteria (AC1, AC2, AC3) through explicit assertions
  5. Provides clear diagnostic error messages when artifacts are missing or invalid
  6. Tests complete with no environment variables required (no ADO PAT needed)

  The test runs successfully with pytest and all 11 tests in the file pass without
  requiring external dependencies. The test harness includes helper methods for
  artifact creation, existence verification, and schema validation that can be
  reused for future integration tests.

