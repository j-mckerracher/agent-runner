librarian_queries:
  - query: "How should integration tests be structured for multi-stage workflows in Python?"
    confidence_received: "full"
    answer_summary: |
      Prior UoWs (001-004) established that synthetic workflow stages create canonical artifacts
      that follow a predictable schema. Integration tests should verify the artifact chain by:
      1. Creating mock artifacts at each stage
      2. Verifying existence with clear error messages
      3. Validating YAML/JSON schema with required fields
      4. Testing detection mechanisms (synthetic markers, absence of ADO metadata)
      This test pattern is reusable for future integration tests

