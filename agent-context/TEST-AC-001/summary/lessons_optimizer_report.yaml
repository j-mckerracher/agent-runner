recommended_rules:
  - rule_id: RULE-001
    target_agent: "software-engineer-hyperagent"
    target_stage: "implementation"
    priority: "high"
    rule: |
      **Test Assertion Schema Verification** — Before writing test assertions to verify artifact
      structure, ALWAYS inspect actual artifacts from prior stages first. Read the actual
      artifact files (story.yaml, config.yaml, etc.) and use grep/YAML parsing to determine
      the exact field names and locations that exist. DO NOT write tests expecting fields
      or markers that were not verified against actual produced artifacts.

      Specifically: If tests verify that a field equals a specific value (e.g.,
      `project_type='synthetic-fixture'`), first run `grep -r 'project_type'
      {CHANGE-ID}/intake/` and examine actual YAML structure to confirm the field
      exists at the expected location before writing the assertion.
    rationale: |
      Root cause of TEST-001-IMPL-REPORT-MISMATCH: UOW-003 and UOW-004 created tests
      expecting specific field names/locations in artifacts (project_type at top level,
      fixture_path in raw_input section) based on specification assumptions. However,
      the actual intake agent created artifacts with different schema:
      - project_type='python-cli' at top level (not 'synthetic-fixture')
      - synthetic markers in run_metadata.source_type instead
      - raw_input field names were 'source' and 'fixture_content' not 'fixture_path'

      This caused test assertion failures (10 failed tests) but impl_reports claimed
      100% pass rates. Prevention: inspect actual artifacts before writing test expectations.
    trigger_check: |
      TRIGGERS: Any test method that asserts a value exists in a yaml/json artifact
      produced by an upstream stage (e.g., story.yaml from intake, config.yaml from task-gen)

      CHECK: (1) Before writing any assertion about artifact field X equals value Y,
      (2) Read the actual artifact file and verify X exists at the documented location
      (3) Use `grep` or YAML parser to confirm the actual value matches the expected type
      (4) Only then write the test assertion with confidence
    source_lessons: ["QA Report: TEST-AC-001, Issue TEST-001-IMPL-REPORT-MISMATCH"]
    confidence_score: 95
    enforcement_type: "mandatory_check"

  - rule_id: RULE-002
    target_agent: "software-engineer-hyperagent"
    target_stage: "implementation"
    priority: "high"
    rule: |
      **Implementation Report Test Pass Rate Accuracy** — When writing impl_report.yaml,
      the `commands_executed` section must include actual pytest/test command output showing
      pass/fail counts. BEFORE finalizing any claim of "all tests pass", run the complete
      test suite and copy the actual output (including pytest summary line with pass/fail counts).

      Specifically: Do NOT write `"output_summary": "All 39 tests passed"` based on expectation.
      Instead write: `"output_summary": "<actual pytest command output>"` where output includes
      the pytest summary line `X passed, Y failed` (if Y > 0, adjust impl_report_status accordingly).
    rationale: |
      Root cause of TEST-001-IMPL-REPORT-MISMATCH (test accuracy part): UOW-003 impl_report
      claimed "39/39 tests pass" but actual test execution showed 3 failures in
      test_intake_artifacts.py. UOW-004 impl_report claimed "25/25 tests pass" but 7 tests
      failed in test_downstream_synthetic_mode.py. The impl_reports did not include actual
      pytest output showing the failures.

      This discrepancy suggests the impl_reports were written before running the full test
      suite, or test output was not carefully reviewed. Prevention: always include actual
      pytest output as evidence, showing exact pass/fail counts.
    trigger_check: |
      TRIGGERS: Any time you write a claim like "X/X tests passed" or "all tests pass"
      in impl_report.yaml

      CHECK: (1) Run `python -m pytest <test_file> -v` (or full test suite)
      (2) Copy the actual pytest summary output (the line with "X passed, Y failed")
      (3) If Y > 0, do NOT claim "all tests pass" — instead report "X passed, Y failed"
         and explain why failures are expected/remediable
      (4) Include the actual command and output in `commands_executed`
    source_lessons: ["QA Report: TEST-AC-001, Issue TEST-001-IMPL-REPORT-MISMATCH"]
    confidence_score: 95
    enforcement_type: "mandatory_check"

  - rule_id: RULE-003
    target_agent: "software-engineer-hyperagent"
    target_stage: "implementation"
    priority: "high"
    rule: |
      **Documentation Schema Alignment Verification** — When writing documentation
      (README, guides, comments) that references artifact fields or markers, ALWAYS verify
      those fields exist in actual artifacts before documenting them. If documentation says
      "config.yaml contains project_type='synthetic-fixture'", confirm by inspecting actual
      config.yaml files in the artifacts. Use `grep project_type agent-context/*/intake/config.yaml`
      to verify the actual values exist before finalizing documentation.

      Specifically: If a documented marker is supposed to signal behavior to downstream stages,
      verify the marker exists in produced artifacts AND that downstream detection logic will
      find it at the documented location.
    rationale: |
      Root cause of TEST-002-SCHEMA-DOCUMENTATION: README.md documentation (line 59)
      documented the synthetic mode marker as `config.yaml project_type: 'synthetic-fixture'`,
      but actual config.yaml from the intake agent has:
      - Top-level `project_type: 'python-cli'`
      - Synthetic markers in `run_metadata.source_type='synthetic_fixture'` and
        `run_metadata.fixture_path`

      This mismatch means users and downstream developers reading the documentation would
      look for the wrong marker. Prevention: always verify documentation against actual
      artifacts before finalizing.
    trigger_check: |
      TRIGGERS: Any time you write documentation (README, comments, guides) that references
      specific field values, markers, or artifact structure

      CHECK: (1) Identify the artifact file and field being documented (e.g., "config.yaml project_type")
      (2) Read actual artifact files from the workflow and grep for the field
      (3) Confirm the field exists at the documented location with the documented value
      (4) If actual differs from documented: update documentation OR flag as assumption to be verified
    source_lessons: ["QA Report: TEST-AC-001, Issue TEST-002-SCHEMA-DOCUMENTATION"]
    confidence_score: 90
    enforcement_type: "mandatory_check"

  - rule_id: RULE-004
    target_agent: "task-generator"
    target_stage: "planning"
    priority: "medium"
    rule: |
      **Artifact Schema Specification Requirement** — When creating artifacts consumed
      by downstream stages, document the exact schema of those artifacts in the constraints.md
      or in structured comments within the artifact file itself. Specifically: document which
      fields are at top level, which are nested under metadata sections, and what values
      downstream stages should use to detect modes/options.

      For synthetic mode artifacts: explicitly document that synthetic detection uses
      `config.yaml run_metadata.source_type` as the primary marker (not top-level project_type).
    rationale: |
      The absence of a clear schema specification contributed to both the test assertion
      mismatch (RULE-001) and documentation mismatch (RULE-003). Intake agent created
      artifacts with synthetic markers in run_metadata, but this structure was not formally
      documented. Downstream stages and test suites had to infer the correct detection mechanism.

      Prevention: explicitly document artifact schema when it differs from common expectations.
    trigger_check: |
      TRIGGERS: Any time you create artifacts that will be read by downstream stages
      (e.g., intake creating story.yaml/config.yaml for downstream agents)

      CHECK: (1) Identify all fields in the artifact that downstream stages need to detect
      (2) Document whether each field is top-level or nested (and under which key)
      (3) Include examples showing actual field structure
      (4) Add to constraints.md or as structured comments in the artifact
    source_lessons: ["QA Report: TEST-AC-001, Issues TEST-001 + TEST-002 (root cause)"]
    confidence_score: 85
    enforcement_type: "mandatory_check"

  - rule_id: RULE-005
    target_agent: "qa-evaluator"
    target_stage: "qa"
    priority: "medium"
    rule: |
      **Test Assertion Failure Analysis** — When evaluating implementation reports, if the
      reported test pass rate differs from actual test execution results, explicitly flag
      this as a high-severity issue requiring correction. Do NOT accept claims of "X tests
      pass" without evidence.

      Specifically: Run the full test suite yourself (even if impl_report claims all pass)
      and compare actual vs reported results. If there are discrepancies, mark the UOW as
      "needs_correction" with specific failing test names.
    rationale: |
      The QA evaluator detected the mismatch between claimed pass rates (impl_reports saying
      100% pass) and actual results (10 test failures) only by running the full test suite
      independently. This should have been caught earlier if test assertion accuracy was
      verified during evaluation.

      Prevention: QA evaluator should independently verify all test pass rate claims.
    trigger_check: |
      TRIGGERS: Any evaluation of impl_report.yaml that includes claims about test pass rates

      CHECK: (1) Extract the reported pass rate from impl_report (e.g., "39/39 tests pass")
      (2) Run the actual test command independently: `python -m pytest <test_file> -v`
      (3) Compare: if reported != actual, flag as issue and include actual pytest output
    source_lessons: ["QA Report: TEST-AC-001, Issue TEST-001-IMPL-REPORT-MISMATCH"]
    confidence_score: 95
    enforcement_type: "mandatory_check"

