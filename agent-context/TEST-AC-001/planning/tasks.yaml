story_id: TEST-AC-001
title: Synthetic workflow smoke test story

librarian_queries:
  - query: "What is the current structure of agent-runner? Where are entry points and intake handlers?"
    confidence_received: "full"
    answer_summary: "agent-runner has run.py as entry point, workflow_inputs.py for input resolution, steps.py for stage orchestration. Synthetic fixture support infrastructure is already in place: load_story_fixture() validates and loads JSON, resolve_workflow_input() routes to synthetic or ADO mode, build_intake_prompt() generates mode-appropriate prompts for intake agent."

librarian_exploration_summaries: []

tasks:
  - task_id: "T1"
    title: "Verify and document fixture validation and error handling"
    description: |
      The workflow_inputs.py module has comprehensive validation (load_story_fixture) that must work correctly:
      1. Reject fixtures missing required fields (title, description, acceptance_criteria)
      2. Fail fast on invalid acceptance_criteria format (malformed JSON)
      3. Validate that acceptance_criteria is either list or dict of strings
      4. Provide clear error messages for malformed fixtures

      All validation tests currently pass. This task verifies validation behavior aligns with
      NFR "fail fast on malformed fixture input" and ensures AC2 (preserving correct input)
      cannot succeed with malformed input. Update test coverage if needed to ensure edge cases
      (empty lists, null values, missing keys) are covered.
    acceptance_criteria_mapped:
      - AC2
    dependencies: []
    priority: "high"
    estimated_complexity: "simple"
    definition_of_done:
      - "All unit tests in test_workflow_inputs.py pass (validation tests: test_load_story_fixture_*)"
      - "Coverage confirmed for missing required fields (title, description, acceptance_criteria)"
      - "Coverage confirmed for invalid acceptance_criteria format (non-list/non-dict, empty list/dict, non-string values)"
      - "Error messages verified to be clear and actionable (pytest output matches expected regex patterns)"
      - "load_story_fixture() function has JSDoc explaining validation contract"
      - "Edge cases tested: empty strings, whitespace-only strings, None values in lists/dicts"

  - task_id: "T2"
    title: "Fix and verify workflow routing for synthetic mode"
    description: |
      The main entry point (run.py) and workflow routing (resolve_workflow_input()) already accept
      and process the --story-file argument. This task verifies:
      1. run.py correctly parses --story-file argument
      2. resolve_workflow_input() correctly sets intake_mode="synthetic" for story_file input
      3. step_intake() receives mode="synthetic" and uses correct prompt
      4. Workflow correctly defaults to bundled synthetic_story.json when no args given
      5. Test assertions correctly verify the runner parameter is passed through

      Fix test_main_defaults_to_bundled_synthetic_fixture() which currently fails because
      the assertion does not expect the runner parameter in step_intake() call.
    acceptance_criteria_mapped:
      - AC1
    dependencies: []
    priority: "high"
    estimated_complexity: "simple"
    definition_of_done:
      - "Fix test assertion in test_steps_and_run.py::RunMainTests::test_main_defaults_to_bundled_synthetic_fixture to expect runner='claude' parameter"
      - "End-to-end test: run.py --story-file <path> starts workflow with synthetic mode"
      - "End-to-end test: run.py with no args defaults to bundled TEST-AC-001 fixture"
      - "Unit test: resolve_workflow_input() sets mode='synthetic' when story_file provided"
      - "Unit test: resolve_workflow_input() sets mode='ado' when story_file not provided"
      - "Unit test: step_intake() receives correct mode parameter and uses synthetic prompt"
      - "All routing tests pass without ADO dependencies (pytest passes with 15/15)"
      - "Argument parsing in run.py is documented with usage examples in --help"

  - task_id: "T3"
    title: "Verify intake agent creates canonical artifacts for synthetic stories"
    description: |
      The intake stage receives a synthetic-specific prompt from build_intake_prompt() in steps.py.
      This task verifies the intake agent correctly:
      1. Reads the synthetic_story.json fixture from the provided path
      2. Normalizes acceptance criteria from list form (AC1..AC3) to keyed YAML format
      3. Creates three canonical artifacts: story.yaml, config.yaml, constraints.md
      4. Preserves the raw fixture JSON under raw_input section
      5. Sets project_type to "synthetic-fixture" in config.yaml
      6. Skips all ADO-specific operations (no azure-devops-cli calls)

      Verify that intake artifacts generated by the intake agent match the expected schema
      and correctly preserve the fixture contents while normalizing format.
    acceptance_criteria_mapped:
      - AC2
      - AC3
    dependencies: []
    priority: "high"
    estimated_complexity: "moderate"
    definition_of_done:
      - "Intake agent successfully processes synthetic_story.json fixture (manual invocation or agent test)"
      - "Output artifacts created: story.yaml with keyed AC1/AC2/AC3 format"
      - "Output artifacts created: config.yaml with project_type='synthetic-fixture' and normalized fields"
      - "Output artifacts created: constraints.md documenting raw_input preservation and synthetic nature"
      - "Raw fixture JSON is preserved under raw_input section in story.yaml"
      - "No azure-devops-cli commands are invoked during synthetic intake (agent log verification)"
      - "Artifacts validated against canonical schema: all required fields present and correctly typed"
      - "Acceptance criteria normalized from list form to keyed form: AC1, AC2, AC3"

  - task_id: "T4"
    title: "Verify downstream stages skip ADO operations for synthetic artifacts"
    description: |
      Downstream stages (task-gen, task-assigner, software-engineer, QA) must correctly detect
      synthetic mode and skip ADO-specific operations:
      1. Task generator reads config.yaml and detects project_type="synthetic-fixture"
      2. Task generator skips all ADO-specific operations (no work-item writes)
      3. Task assigner does not attempt to write assignments back to ADO
      4. Software engineer does not attempt ADO work-item status updates
      5. QA stage does not require ADO connectivity

      Verify that all downstream stages handle the absence of ado_provenance metadata and
      proceed with local-only workflow execution. This is critical for AC3 verification.
    acceptance_criteria_mapped:
      - AC3
    dependencies:
      - T3
    priority: "high"
    estimated_complexity: "moderate"
    definition_of_done:
      - "Task generator module correctly reads project_type from config.yaml"
      - "Task generator skips all ADO-specific operations when project_type='synthetic-fixture'"
      - "Task assigner detects synthetic mode and skips writing assignments to ADO"
      - "Software engineer stage detects synthetic mode and skips ADO work-item updates"
      - "QA stage operates without requiring Azure AD authentication or ADO connectivity"
      - "All downstream stage skip logic is tested via unit tests (mocked ADO calls)"
      - "Integration test confirms no external ADO API calls are made in synthetic mode"
      - "Clear error message if ADO integration is accidentally triggered in synthetic mode"

  - task_id: "T5"
    title: "Add comprehensive integration test for full synthetic workflow"
    description: |
      Create or enhance test_steps_and_run.py to run the full workflow with synthetic_story.json
      and verify:
      1. All stages complete successfully (intake → planning → assignment → implementation → QA)
      2. Canonical artifacts are created correctly at each stage
      3. No external dependencies (Azure, ADO) are required
      4. Workflow output matches expected structure
      5. Error handling works correctly for malformed inputs

      This provides a repeatable test harness to verify AC1, AC2, AC3 are met and prevents
      regression if the workflow is modified. It serves as end-to-end validation that all stages
      work correctly together in synthetic mode.
    acceptance_criteria_mapped:
      - AC1
      - AC2
      - AC3
    dependencies:
      - T1
      - T2
      - T3
    priority: "high"
    estimated_complexity: "moderate"
    definition_of_done:
      - "Integration test test_full_synthetic_workflow() added to test_steps_and_run.py (or enhanced in existing test)"
      - "Test runs all workflow stages (intake → planning → assignment → implementation → QA)"
      - "Test verifies artifact creation at each stage matches expected schema"
      - "Test confirms no Azure DevOps or external API calls are made"
      - "Test runs with pytest and passes without environment variables (no ADO PAT needed)"
      - "Test includes assertions on artifact content and structure (story.yaml, config.yaml, constraints.md)"
      - "Test failure provides clear diagnostics (which stage failed, what artifact was wrong)"
      - "Test coverage: verifies all three AC1, AC2, AC3 conditions are met in end-to-end execution"

  - task_id: "T6"
    title: "Document synthetic workflow usage and behavior"
    description: |
      Create or update documentation to explain:
      1. How to run the workflow with synthetic fixtures (--story-file argument)
      2. Default behavior when no args are provided (uses bundled TEST-AC-001)
      3. How synthetic mode differs from ADO mode (no external API calls, local execution)
      4. How to create custom synthetic fixtures for local testing
      5. Expected artifact structure for synthetic fixtures
      6. Error messages and troubleshooting for common fixture issues

      This supports the constraint "Keep any code changes minimal and easy to verify" by making
      the workflow behavior clear and obvious. It documents the behavior verified by T1-T5,
      ensuring downstream teams understand how to use the synthetic workflow.
    acceptance_criteria_mapped:
      - AC1
      - AC3
    dependencies:
      - T2
      - T3
    priority: "low"
    estimated_complexity: "simple"
    definition_of_done:
      - "README or CONTRIBUTING.md updated with synthetic fixture usage example"
      - "Documentation explains --story-file argument and default behavior (references run.py --help)"
      - "Documentation contrasts synthetic vs. ADO modes clearly (local vs. external, required fields, etc.)"
      - "Example fixture structure provided for custom fixture creation (JSON schema reference)"
      - "All code references in documentation verified against actual codebase (file paths, function names)"
      - "Documentation includes error handling section (what errors mean, how to fix them)"
      - "Fixture validation requirements documented (required fields, acceptance_criteria formats)"

ac_coverage_matrix:
  AC1:
    - T2
    - T5
    - T6
  AC2:
    - T1
    - T3
    - T5
  AC3:
    - T3
    - T4
    - T5
    - T6

notes: |
  Context Assessment:
  The agent-runner project has substantial synthetic fixture infrastructure already in place:
  - Argument parsing for --story-file in run.py (lines 67-72)
  - load_story_fixture() with comprehensive validation in workflow_inputs.py (lines 65-79)
  - resolve_workflow_input() routing logic in workflow_inputs.py (lines 91-140)
  - build_intake_prompt() with synthetic-specific instructions in steps.py (lines 24-35)
  - test-fixtures/synthetic_story.json fixture file exists
  - Comprehensive unit tests in tests/test_workflow_inputs.py (9 test cases, all passing)
  - Unit tests for intake prompt in tests/test_steps_and_run.py (3 tests, all passing)

  Test Status (as of 2026-04-21):
  - 14 of 15 unit tests pass
  - 1 test failure: test_main_defaults_to_bundled_synthetic_fixture() expects step_intake() call without runner parameter
    but actual call includes runner='claude'. This is a test assertion issue, not a code issue.

  All acceptance criteria can be verified through:
  1. Fixture validation (T1 → AC2) — validation already exists, just needs verification
  2. Workflow routing (T2 → AC1) — routing already exists, test assertion needs fix
  3. Intake artifact creation (T3 → AC2, AC3) — depends on intake agent behavior
  4. Downstream stage behavior (T4 → AC3) — requires verification of skip logic
  5. Integration test (T5 → all ACs) — end-to-end workflow validation
  6. Documentation (T6 → AC1, AC3) — explains how to use synthetic workflow

  Iteration 2 Improvements:
  - Fixed test assertion issue: T2 DoD now includes fixing test_main_defaults_to_bundled_synthetic_fixture
  - Consolidated validation task (T6 from iteration 1 merged into T1) with focus on verification
  - Reordered tasks: validation first, then routing, then artifact creation, then downstream, then integration, then docs
  - Enhanced DoD items to be more specific and measurable
  - Clarified dependencies: T5 (integration) depends on T1, T2, T3 (core functionality)
  - T4 (downstream) depends only on T3 (intake artifacts) since it verifies downstream stage behavior
  - Adjusted priorities: T4 and T5 remain "high" as critical validation gates
  - T6 remains "low" as documentation task (final step after verification complete)
  - Better integration of error handling into relevant tasks (edge cases in T1)

  Risks & Considerations:
  - Test Failure: test_main_defaults_to_bundled_synthetic_fixture needs assertion fix (now in T2 DoD)
  - Intake Agent Responsibility: The intake agent must correctly interpret the synthetic-mode prompt and create
    proper artifacts. This depends on the intake agent's implementation and understanding of the prompt.
  - Downstream Compatibility: The synthetic workflow must preserve the canonical artifact contract so downstream
    stages work without modification. Verification in T4 is critical.
  - No Production Code Changes Required: The infrastructure is already in place. Tasks focus on verification,
    fixing test assertions, and testing.

  Task Ordering Notes:
  - Parallel group 1 (can run independently): T1, T2 (validation and routing)
  - T3 depends on T1, T2 (intake artifact verification)
  - T4 depends on T3 (downstream behavior requires verified intake artifacts)
  - T5 depends on T1, T2, T3 (integration test needs all core pieces verified)
  - T6 last (documentation task that summarizes verified behaviors)
  - Recommended sequential order for minimal iterations: T1/T2 → T3 → T4 → T5 → T6

metacognitive_context:
  decision_rationale: |
    The task decomposition focuses on verification and integration testing rather than
    implementation, because the infrastructure for synthetic fixture support is already
    substantially present in the codebase. The acceptance criteria are about ensuring
    the workflow works correctly with synthetic fixtures, not about building the
    infrastructure from scratch.

    Iteration 2 adjustments:
    1. Fixed test assertion issue in T2 (runner parameter mismatch) as concrete DoD item
    2. Consolidated validation + error handling into single task (T1) with clear focus
    3. Reordered tasks to flow naturally: validate → route → create artifacts → downstream → integration → docs
    4. Enhanced DoD items to be more measurable and specific (concrete test names, file paths, expected assertions)
    5. Clarified dependencies: integration test (T5) depends on all core tasks (T1-T3)

    Tasks are grouped by workflow stage:
    1. Input validation (T1) — ensures malformed input fails fast
    2. Workflow routing (T2) — ensures synthetic mode is selected correctly
    3. Intake artifact creation (T3) — ensures canonical artifacts are created
    4. Downstream behavior (T4) — ensures ADO operations are skipped
    5. Integration testing (T5) — end-to-end validation of all above
    6. Documentation (T6) — final task explaining usage

  alternatives_discarded:
    - approach: "Implementation-heavy decomposition with separate tasks for each stage"
      reason_rejected: "Most of the infrastructure already exists; this would be redundant work."
    - approach: "Single monolithic task"
      reason_rejected: "Would be too large. Breaking into logical phases enables parallel work and clearer success criteria."
    - approach: "Omit fixture validation task (T1)"
      reason_rejected: "The NFR 'fail fast on malformed input' and AC2 'preserves raw input' both require robust validation."
    - approach: "Omit integration test (T5)"
      reason_rejected: "End-to-end verification is critical to ensure all stages work together without regressions."
    - approach: "Omit documentation task (T6)"
      reason_rejected: "Story constraint 'easy to verify' and examples mentioning fixture usage require clear documentation."

  knowledge_gaps:
    - "Exact behavior of the intake agent when given synthetic-mode prompt (depends on agent implementation)"
    - "Current state of downstream stages' synthetic mode detection (T4 requires verification)"
    - "Whether additional error handling is needed beyond current validation (T1 verification will clarify)"

  tool_anomalies: []
  revision_notes:
    - "Iteration 1: Added explicit DoD sections to all tasks and mapped T5/T6 to ACs"
    - "Iteration 2: Fixed test assertion issue in T2 (runner parameter mismatch)"
    - "Iteration 2: Consolidated validation + error handling into T1 for focus"
    - "Iteration 2: Reordered tasks for natural workflow progression"
    - "Iteration 2: Enhanced DoD items to be specific and measurable (test names, file references)"
    - "Iteration 2: Clarified task dependencies and parallel execution opportunities"
