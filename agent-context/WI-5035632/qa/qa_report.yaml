      interception via CanDeactivate (UOW-002), dialog component/service (UOW-003),
      and full integration wiring (UOW-004).
    evidence:
      - >
        Jest: orders.store.dirty-state.spec.ts — 14/14 pass. Validates that
        OrdersStore.hasChanged() is set when order is modified and cleared on
        save (setActiveOrder) and discard (clearOrder). Executed:
        nx test specimen-accessioning-orders-ui --testFile=.../dirty-state.spec.ts
        Result: 14 passed, 0 failed. Time: 15.484s
      - >
        Jest: unsaved-changes.guard.spec.ts — 12/12 pass. Validates guard
        fast-path (clean state allows immediately), dialog-open assertion when
        dirty, cancel path (blocks), discard path (clears dirty, allows),
        save-success path (allows), save-error path (blocks), consumer contract.
        Executed: nx test specimen-accessioning-orders-ui --testFile=.../guard.spec.ts
        Result: 12 passed, 0 failed. Time: 3.64s
      - >
        Cypress component-test: unsaved-changes-dialog.component.cy.ts — 10/10 pass.
        Validates dialog layout (6 tests), visibility (1 test), and all three
        action button paths (3 tests: save, discard, cancel). All data-test-id
        selectors verified. Executed: nx component-test specimen-accessioning-orders-ui
        --browser=chrome --spec="**/unsaved-changes-dialog/**/*.cy.ts"
        Result: 10 passing (519ms), 0 failing.
      - >
        Code inspection of app.routes.ts confirmed canDeactivate: [unsavedChangesGuard]
        applied to all three OrdersFeatComponent routes (order/new, order/:orderUid, '').
        triage-worklist route correctly excluded (no dirty state concept for that component).
      - >
        Code inspection of orders-feat.component.html confirmed <lib-unsaved-changes-dialog>
        is placed at line 87, outside all @if/@else blocks, ensuring dialog is always
        in DOM for any active order route. Component correctly imports
        UnsavedChangesDialogComponent (verified in orders-feat.component.ts lines 19, 54).
      - >
        Code inspection of unsaved-changes.guard.ts confirmed complete switchMap flow:
        clean state -> returns true immediately; dirty state -> dialogService.open() piped
        through switchMap: cancel->of(false), discard->setHasChanged(false)+of(true),
        save->from(saveMiddleware.saveForNavigation()). Architecture is correct.
    notes: >
      Manual smoke-test (live browser navigation with menu while order is dirty) is not
      possible in agent context — deferred as a condition of approval. Automated test
      coverage is comprehensive across all code paths. The CanDeactivate hook fires for
      all PrimeNG p-menu routerLink navigations which covers the AC1 requirement exactly.

