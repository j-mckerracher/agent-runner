knowledge_summary: >
  WI-5035632 implements a complete unsaved-changes navigation guard for Specimen
  Accessioning order pages using Angular Router's CanDeactivateFn pattern. The
  implementation is architecturally sound and follows established codebase patterns.

  KEY ARCHITECTURAL DECISIONS:
  - CanDeactivateFn (functional) rather than class-based guard — modern Angular 14+
    pattern, cleaner, avoids component interface coupling.
  - Guard placed in orders-ui library (not app) — co-located with its OrdersStore
    and UnsavedChangesDialogService dependencies.
  - Service+Subject+take(1) pattern for dialog async API — decouples guard from dialog
    DOM placement; single-emission Observable prevents memory leaks.
  - saveForNavigation() added to SaveMiddleware — isolates guard from saveOrder()'s
    AOE/label side-effects; wraps completeSaveActions() in try/catch.
  - Dialog hosted in OrdersFeatComponent template (not app shell) — covers exactly
    the three routes with canDeactivate, not the entire application.

  REUSABLE PATTERNS IDENTIFIED:
  - jest.mock('primeng/cascadeselect') before imports — resolves pre-existing PrimeNG
    CascadeSelect TDZ Jest failure for any spec file importing from
    @rls/shared/data-access/orders-data-access. Could be applied codebase-wide.
  - Subject + take(1) async dialog API — reusable pattern for any future service-driven
    confirmation dialogs that need to expose a single-emission Observable.
  - of(action) mock replacement for Subject in tests — simpler and equivalent for unit
    tests of guard async logic; avoids Subject completion gotcha.

  TEST COVERAGE SUMMARY:
  - 14 Jest tests: dirty-state signal set/clear behavior (UOW-001)
  - 12 Jest tests: guard all three dialog action paths + fast-path (UOW-002/004)
  - 10 Cypress component tests: dialog layout, visibility, all three button actions (UOW-003)
  - Total: 36 automated tests, all passing.

