librarian_queries:
  - query: "Does an existing CanDeactivate guard or unsaved-changes navigation interceptor exist in the codebase?"
    confidence_received: "full"
    answer_summary: >
      Confirmed via UOW-001 impl_report observations and direct codebase inspection:
      no CanDeactivate guard existed prior to this story. Only guard in the codebase
      was auth.guard.ts (CanActivate) in libs/shared/core. All unsaved-changes guard
      infrastructure is new, created by this story's UoWs.
  - query: "What navigation technology drives the specimen accessioning menu?"
    confidence_received: "full"
    answer_summary: >
      PrimeNG <p-menu> in CoreHeaderComponent with menu items built by buildMenuItem()
      in header-utils.ts. Internal links use routerLink property, confirming that
      Angular Router's canDeactivate hook fires before any menu-triggered navigation.
      CanDeactivateFn is the correct and sufficient intercept strategy.
  - query: "How is dirty state detected and cleared in OrdersStore?"
    confidence_received: "full"
    answer_summary: >
      OrdersStore.hasChanged() is a boolean signal auto-computed by the
      watchForOrderChanges effect comparing order vs initialOrder via
      validateSaveEnablement(). Cleared by setActiveOrder() (save path) or
      clearOrder() (discard path). setHasChanged(bool) provides an explicit
      override for the guard discard path.

librarian_exploration_summaries:
