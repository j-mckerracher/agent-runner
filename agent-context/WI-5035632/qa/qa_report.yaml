release_notes:
  - >
    Implements the unsaved-changes navigation guard for Specimen Accessioning order
    pages. When a user modifies an order and attempts to navigate away using the
    application menu, a confirmation dialog now intercepts the navigation.
  - >
    When an order page has unsaved changes, navigating away via the application menu
    now shows an "Unsaved Changes" dialog with three options: "Save & Continue"
    (saves the order then navigates), "Discard & Continue" (discards changes and
    navigates), or "Cancel" (stays on the current page).
  - >
    Navigation without unsaved changes is unaffected — no dialog appears and the
    user navigates normally.
  - >
    Known limitation: saveForNavigation() intentionally skips AOE sidebar check and
    post-save label printing (appropriate for guard-context saves where the user is
    leaving the page). If business rules ever require label printing on
    navigation-save, this method would need enhancement.
  - >
    Known limitation: Manual smoke-test in a live browser environment was not
    performed by the implementation agent and is required before production release.

