change_id: "WI-5035632"
title: "Navigating away from page through menu"
description: |
  As a user, I need the unsaved items dialog box to show if I navigate away using the menu.

  When the page state is altered with unsaved changes, navigating away via menu should trigger
  the unsaved changes dialog to prevent accidental data loss.

acceptance_criteria:
  AC1: "When the page is altered and has unsaved changes, navigating away from the page using the menu displays an unsaved changes dialog"
  AC2: "The dialog prompts the user to either save changes, discard changes, or cancel navigation"
  AC3: "Dialog appears for all menu-based navigation (not just specific routes)"

examples:
  - "User fills in a form field, then clicks a menu link to navigate away - dialog appears"
  - "User makes multiple edits across fields, clicks menu navigation - dialog appears"
  - "User navigates away from menu without changes - dialog does not appear"

