notes: >
  First lessons-optimizer run for this pipeline installation. No prior lessons.md
  exists. Primary finding: the qa-engineer prompt's QA Report Requirements section
  has 4 field names/types that conflict with the schema validator. This structural
  defect caused 1 failed QA evaluation iteration. Rule injected into 05-qa.agent.md.
  A secondary tool defect (check-test-harnesses.py naming convention) was identified
  and recorded as a medium-confidence recommendation pending script fix.

metacognitive_context:
  decision_rationale: >
    Evaluated all WI-5035632 artifacts sequentially (planning → execution → QA) to
    identify mistake signatures. The QA schema mismatch was the only workflow-blocking
    mistake; all implementation stages passed on first attempt. Chose to inject the
    QA rule at high confidence because (a) root cause is unambiguous (prompt has wrong
    field names), (b) the fix is a direct prevention (run validator before submitting),
    and (c) without injection, the same failure will recur on every future QA run.
    The harness script issue was kept at medium confidence because it is a tool defect
    that should be fixed at the script level, not worked around at the agent level.
  alternatives_discarded:
    - approach: >
        Inject harness-script workaround rule into 08-implementation-evaluator.agent.md
      reason_rejected: >
        Medium confidence — the root cause is a broken script, not agent reasoning.
        Injecting a workaround rule risks normalizing the script defect and reducing
        pressure to fix it. Recommendation in rule-recommendations.md is more
        appropriate.
    - approach: >
        Flag the qa-engineer prompt field names as a spec_ambiguity escalation
      reason_rejected: >
        The schema validator is authoritative and unambiguous. Escalating would delay
        the fix; direct injection resolves it immediately and the recommendation to
        fix the prompt source provides the permanent fix path.
    - approach: >
        Append lessons to agent-context/lessons.md
      reason_rejected: >
        No lessons.md exists. Per fallback mode in lessons-capture skill protocol,
        lessons are emitted in the optimizer report artifacts instead.
  knowledge_gaps:
    - >
      Whether validate-artifact-schema.py has a qa_report schema definition that
      was introduced after the qa-engineer prompt was written — if so, the schema
      and prompt drifted over time and neither party updated the other.
    - >
      Whether check-test-harnesses.py has been reported as a known defect in a
      prior session — cannot determine without prior lessons.md.
  tool_anomalies:
    - tool: check-test-harnesses.py
      anomaly: >
        Script exits 1 (false negative) for mcs-products-mono-ui components because
        it constructs expected harness path as *.test-harness.ts but codebase
        convention is *.component.test-harness.ts. Affects all UoWs modifying
        Angular components in this codebase.
