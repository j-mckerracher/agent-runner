    requiring no extra iterations but adding evaluator cognitive overhead.

mistake_signatures:
  - id: SIG-001
    agent: qa-engineer
    pattern: schema_field_name_mismatch_in_qa_report
    trigger_context: generating_qa_report_without_running_schema_validation
    root_cause_analysis: >
      The qa-engineer agent's own prompt ("QA Report Requirements" section) specifies
      incorrect field names that do not match the schema validator output schema.
      The agent faithfully followed its prompt — using story_id, qa_status,
      acceptance_criteria_validation dict, and release_notes dict — but all four
      fields are non-conformant per validate-artifact-schema.py. This is a
      prompt-schema mismatch, not a reasoning error. The agent had no mechanism
      to detect the conflict without running the validator. Root cause category:
      ignored_constraints (did not run validator before submitting).
    confidence: high
    iteration_cost: 1
    injected: true
    injection_target: 05-qa.agent.md

  - id: SIG-002
    agent: implementation-evaluator
    pattern: check_test_harnesses_script_false_negative
    trigger_context: mcs_products_mono_ui_component_harness_naming_convention
    root_cause_analysis: >
      check-test-harnesses.py constructs the expected harness filename by stripping
      '.component.ts' and appending '.test-harness.ts', but the mcs-products-mono-ui
      codebase convention is '*.component.test-harness.ts'. The script exits 1
      (false negative) for all components in this codebase. Evaluators in UOW-003
      and UOW-004 correctly identified and overrode the false negative by direct
      filesystem verification. No extra iteration was caused, but each override
      required additional reasoning and carries false-pass risk if evaluators become
      complacent. Root cause: tool defect, not agent reasoning failure.
    confidence: medium
    iteration_cost: 0
    injected: false
    recommendation_id: REC-001

recommended_rules:
  - target_agent: qa-engineer
    injection_file: 05-qa.agent.md
    rule: >
      qa_report.yaml schema field names differ from this prompt's "QA Report
      Requirements" section — always use the schema-conformant names and run
      validation before submitting. See injected rule in 05-qa.agent.md for
      full field mapping table and mandatory validation command.
    rationale: >
      The qa-engineer prompt has 4 field names/types that conflict with the
      schema validator. Without an injected rule, every new QA agent instance
      will follow the (wrong) prompt template and fail schema validation on first
      attempt. The injected rule overrides the prompt template at the point of
      use and adds a mandatory validation gate step.
    trigger_check: >
      Before writing qa_report.yaml: run validate-artifact-schema.py --type
      qa_report and confirm exit 0. Fix all issues before submitting.
    source_lessons:
      - 'WI-5035632/qa/eval_qa_1.json issues SCHEMA-001 through SCHEMA-004'
    confidence: high
    status: injected

  - target_agent: implementation-evaluator
    injection_file: 08-implementation-evaluator.agent.md
    rule: >
      When check-test-harnesses.py exits non-zero for mcs-products-mono-ui
      components, verify filesystem directly for *.component.test-harness.ts
      before treating as a gate failure. See REC-001 in rule-recommendations.md.
    rationale: >
      Script uses wrong suffix for this codebase's naming convention. Evaluators
      need awareness of the false-negative pattern to avoid either incorrectly
      failing clean implementations or becoming complacent about missing harnesses.
    trigger_check: >
      On check-test-harnesses.py exit 1: locate the component directory and glob
      for any *test-harness* file before deciding gate outcome.
    source_lessons:
      - 'WI-5035632/execution/UOW-003/eval_impl_1.json tool_anomalies[0]'
      - 'WI-5035632/execution/UOW-004/eval_impl_1.json tool_anomalies[0]'
    confidence: medium
    status: recommendation_only

recommended_prompt_updates:
  - prompt_file: 05-qa.agent.md
    update_type: refine
    recommendation: >
      Update the "QA Report Requirements" section field names to match the schema
      validator: change story_id to change_id, qa_status to overall_status (with
      values pass|fail|conditional_pass), acceptance_criteria_validation dict to
      ac_validations list, and release_notes structured dict to plain string/list.
      Until this core prompt is corrected, the Optimizer-Injected Rule provides a
      runtime override. Fixing the prompt source eliminates the need for the override.
    priority: high

  - prompt_file: 08-implementation-evaluator.agent.md
    update_type: add
    recommendation: >
      Add awareness of check-test-harnesses.py naming convention limitation for
      mcs-products-mono-ui projects. Either fix the script (preferred) or add a
      note in the Automated Programmatic Gates section that script exit 1 should
      be followed by direct filesystem verification before gate failure.
    priority: medium

