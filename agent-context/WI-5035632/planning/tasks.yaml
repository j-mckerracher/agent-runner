librarian_exploration_summaries: []

tasks:
  - id: "T1"
    title: "Dirty State Detection"
    description: >
      Establish and implement the mechanism for detecting when a Specimen Accessioning page has
      unsaved changes. This includes: (1) discovering whether an existing dirty-state service,
      Angular reactive-form dirty flag, or store-based flag already exists; (2) extending or
      implementing a reusable dirty-state signal that downstream guards can subscribe to;
      (3) ensuring the signal is set when the user modifies form fields and cleared on successful
      save. This is the foundational prerequisite for the navigation guard.
    ac_mapping:
      - "AC1"
    dependencies: []
    priority: "high"
    complexity: "moderate"
    definition_of_done:
      - "Dirty-state detection mechanism identified (reuse existing) or created (new service/flag)"
      - "Signal set correctly when page content is modified"
      - "Signal cleared correctly after successful save"
      - "Jest unit tests cover set/clear behavior for the dirty-state mechanism"

  - id: "T2"
    title: "Menu Navigation Interceptor"
    description: >
      Intercept menu-driven navigation events before they complete when the page has unsaved
      changes. This includes: (1) determining whether the menu uses Angular Router links (enabling
      CanDeactivate guard) or custom click handlers (requiring event interception); (2) implementing
      the appropriate intercept strategy — CanDeactivate guard registered on the route, or a
      menu-level click handler that checks dirty state before allowing navigation; (3) blocking
      navigation and emitting an event that triggers the dialog (T3) when dirty state is true;
      (4) allowing navigation to proceed normally when dirty state is false.
    ac_mapping:
      - "AC1"
    dependencies:
      - "T1"
    priority: "high"
    complexity: "moderate"
    definition_of_done:
      - "Menu navigation is intercepted when dirty state is true"
      - "Menu navigation proceeds unimpeded when dirty state is false"
      - "Intercept strategy matches the menu's underlying navigation mechanism (router vs. handler)"
      - "Jest unit tests cover guard logic: dirty true blocks, dirty false allows"

  - id: "T3"
    title: "Unsaved Changes Dialog Component"
    description: >
      Implement or reuse an unsaved-changes confirmation dialog. This includes: (1) checking
      whether an existing unsaved-changes dialog component exists in the codebase and reusing it
      if so; (2) if no reusable component exists, creating a new dialog conforming to the
      application design system, with three actions — Save & Continue, Discard & Continue, and
      Cancel (stay on page); (3) exposing an observable or promise-based API that the navigation
      interceptor (T2) can use to await the user's decision; (4) writing a Cypress component test
      covering all three action paths.
    ac_mapping:
      - "AC1"
    dependencies:
      - "T1"
    priority: "high"
    complexity: "moderate"
    definition_of_done:
      - "Dialog renders with Save & Continue, Discard & Continue, and Cancel actions"
      - "Dialog integrates with application design system (no bespoke styling divergence)"
      - "Dialog exposes an async API that resolves to the user's chosen action"
      - "Cypress component test written covering all three action outcomes"
      - "Test harness created/updated with data-test-id selectors for all three buttons"
      - "nx component-test passes with no failures"

  - id: "T4"
    title: "Integration — Wire Guard, Dialog, and Save/Discard Outcomes"
    description: >
      Connect the dirty-state signal (T1), navigation interceptor (T2), and dialog (T3) into
      a complete end-to-end flow. This includes: (1) wiring the interceptor to open the dialog
      when navigation is blocked; (2) handling the Save & Continue path — triggering a save
      action and then allowing navigation on success, or keeping the user on the page on save
      failure; (3) handling the Discard & Continue path — clearing dirty state and allowing
      navigation; (4) handling the Cancel path — dismissing the dialog and aborting navigation;
      (5) confirming behaviour in both happy-path and error scenarios (save fails, partial save).
    ac_mapping:
      - "AC1"
    dependencies:
      - "T2"
      - "T3"
    priority: "high"
    complexity: "moderate"
    definition_of_done:
      - "Save & Continue path: save is triggered, navigation proceeds on success, stays on error"
      - "Discard & Continue path: dirty state cleared, navigation proceeds"
      - "Cancel path: dialog closed, user remains on page, no navigation occurs"
      - "Feature is manually smoke-tested via menu navigation with and without unsaved changes"
      - "All existing route guard or navigation tests pass without regression"

ac_coverage_matrix:
  AC1:
    - "T1"
    - "T2"
    - "T3"
    - "T4"

notes: >
  This story has a single explicit acceptance criterion (AC1). All four tasks are required to
  satisfy it end-to-end; no task in isolation constitutes a shippable slice of AC1.

  Key unknowns that must be resolved in the software-engineer stage before implementation begins:
  (a) whether an existing CanDeactivate guard or dirty-state service is present in the codebase
  — if so, extend rather than replace; (b) whether an existing unsaved-changes dialog exists —
  if so, reuse; (c) what technology drives the navigation menu — this determines T2 intercept
  strategy. Each task's definition-of-done includes a discovery step to resolve its own unknowns.

  The trigger scope is explicitly menu-based navigation only (browser back/forward and URL-bar
  changes are out of scope per constraints.md).

  Testing strategy: T1 and T2 are pure logic with no Angular template — Jest unit tests are
  appropriate. T3 involves an Angular component with a template — Cypress component tests are
  mandatory per project DoD standards.

metacognitive_context:
  decision_rationale: >
    Four broad tasks were chosen over a finer-grained decomposition because the story is 3 story
    points and has one AC. The decomposition mirrors the natural dependency chain of the feature:
    you cannot intercept navigation (T2) without knowing dirty state (T1); you cannot display a
    dialog (T3) without dirty state context; you cannot wire the full flow (T4) until intercept
    and dialog both exist. A single monolithic task was rejected because it would exceed a
    reasonable unit-of-work size for the software-engineer agent. More than four tasks was
    rejected as over-decomposition for a 3-point story.
  alternatives_discarded:
    - approach: "Single task covering the entire feature"
      reason_rejected: "Too large for a single software-engineer pass; would exceed iteration limits"
    - approach: "Separate discovery/spike task as T0"
      reason_rejected: >
        Discovery tasks are not implementation tasks. Unknowns are captured as definition-of-done
        discovery steps within each relevant implementation task instead.
    - approach: "Separate test task (T5) for all testing"
      reason_rejected: >
        Per project standards, testing is part of the same task as the component implementation
        and is not a separate optional task.
  knowledge_gaps:
    - "Menu implementation technology (Angular Router links vs. custom click handlers) is unknown without codebase access"
    - "Whether existing CanDeactivate guards are present in mcs-products-mono-ui is unknown"
    - "Whether an existing unsaved-changes dialog component exists is unknown"
    - "Dirty-state detection mechanism currently used in Specimen Accessioning pages is unknown"
  tool_anomalies: []
