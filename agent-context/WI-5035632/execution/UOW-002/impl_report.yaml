uow_id: "UOW-002"
status: "complete"
implementation_summary: >
  Implemented unsavedChangesGuard (CanDeactivateFn<unknown>) in
  libs/pearls/specimen-accessioning/ui/orders-ui/src/lib/guards/unsaved-changes.guard.ts.
  The guard injects OrdersStore and returns !store.hasChanged() — false (blocks navigation)
  when dirty, true (allows) when clean. Applied canDeactivate: [unsavedChangesGuard] to the
  three OrdersFeatComponent routes in app.routes.ts (order/new, order/:orderUid, and '').
  Exported the guard from the library's index.ts barrel. 6 Jest unit tests pass. Both
  specimen-accessioning-orders-ui and rls-specimen-accessioning lint pass with 0 errors/warnings.
  Also fixed a pre-existing unused-import warning from UOW-001's dirty-state spec (OrderModel).

librarian_queries:
  - query: "Does an existing CanDeactivate guard exist in the codebase?"
    confidence_received: "full"
    answer_summary: "No — only auth.guard.ts (CanActivate) in libs/shared/core. Confirmed by UOW-001 impl_report observations."
  - query: "What is the OrdersStore dirty-state API for UOW-002 to consume?"
    confidence_received: "full"
    answer_summary: "store.hasChanged() signal (read). store.setHasChanged(bool) for explicit override. Documented in UOW-001 impl_report."

librarian_exploration_summaries:
  - query: "How does the navigation menu work in specimen accessioning — routerLink or programmatic?"
    summary_received: >
      PrimeNG p-menu with buildMenuItem() in libs/shared/core/src/lib/utils/header-utils.ts.
      Internal links use routerLink property; external links use url. Specimen Accessioning menu
      items are internal, so routerLink is used. CanDeactivate guard is the correct intercept strategy.

