risks_identified:
  - type: "tech_debt"
    description: "Guard currently returns false immediately when dirty — UOW-004 must extend it to open the unsaved-changes dialog (UOW-003) and await user decision before returning. Without UOW-004, menu navigation is permanently blocked when dirty state is true."
    mitigation: "This is intentional per plan. UOW-004 replaces the immediate false return with Observable<boolean> from the dialog."
    requires_escalation: false
  - type: "regression_risk"
    description: "40 pre-existing test suites in specimen-accessioning-orders-ui fail due to PrimeNG CascadeSelect TDZ issue (not introduced by UOW-002). Team workaround involves jest.mock hoisting documented in UOW-001."
    mitigation: "Pre-existing issue, not introduced by this UoW. No regression from UOW-002 changes."
    requires_escalation: false

notes: >
  KEY DISCOVERY — Menu navigation technology resolved:
  The specimen accessioning app's navigation menu is implemented via PrimeNG <p-menu> in
  libs/shared/core/src/lib/components/base-header/base-header.component. Menu items are built
  by buildMenuItem() in libs/shared/core/src/lib/utils/header-utils.ts, which sets routerLink
  for internal paths and url/target for external URLs. Since specimen accessioning menu items
  ('Specimen Accessioning' → '/', 'Triage Worklist' → '/triage-worklist') are internal links,
  Angular Router's canDeactivate hook fires on every menu click before navigation completes.

  DOWNSTREAM API CONTRACT for UOW-004:
  - Import unsavedChangesGuard from '@rls/specimen-accessioning/ui/orders-ui'
  - The guard currently returns !store.hasChanged() synchronously
  - UOW-004 should replace the synchronous return with an Observable from the UOW-003 dialog service:
      const dialogResult$ = dialogService.openUnsavedChangesDialog();
      return dialogResult$.pipe(map(action => action !== 'cancel'));
  - The canDeactivate registration in app.routes.ts does NOT need to change for UOW-004

  NOTE: The triage-worklist route was intentionally NOT given canDeactivate because
  TriageWorklistFeatComponent does not use OrdersStore and has no dirty state concept.

metacognitive_context:
  decision_rationale: >
    CanDeactivateFn<unknown> (functional guard, no class) chosen over class-based CanDeactivate
    interface because: (1) Angular 14+ functional guards are the modern pattern; (2) the guard
    has no constructor dependencies beyond inject(), making a class unnecessary; (3) functional
    guards tree-shake cleanly. Guard placed in orders-ui library (not the app) so it can be
    imported alongside the store it depends on, and because UOW-004 integration will reference
    it from the same package boundary.
  alternatives_discarded:
    - approach: "Class-based CanDeactivate guard implementing CanDeactivate<OrdersFeatComponent>"
      reason_rejected: "Requires component to implement canDeactivate() interface — invasive change to OrdersFeatComponent. Functional guard is simpler and doesn't require component modification."
    - approach: "Menu click handler interceptor instead of router guard"
      reason_rejected: "Menu uses routerLink (confirmed by discovery), so CanDeactivate is the canonical Angular approach. Click handler interception would be more fragile and require modifications to shared header components."
    - approach: "Guard placed in apps/pearls/rls-specimen-accessioning/src/app/"
      reason_rejected: "Co-locating with the store it depends on (orders-ui library) makes the boundary cleaner; app-level placement would require cross-boundary imports in UOW-004."
  knowledge_gaps:
    - "Whether the triage-worklist route ever needs dirty-state protection in the future (not in scope for this story)"
  tool_anomalies: []

