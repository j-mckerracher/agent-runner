risks_identified:
  - type: "tech_debt"
    description: >
      saveForNavigation() skips AOE sidebar check and post-save label printing.
      These are appropriate omissions for a navigation-guard save (user is leaving
      the page), but if business rules ever require labels on navigation-save,
      this method would need enhancement.
    mitigation: "Documented in method JSDoc. Scope is correct per current story requirements."
    requires_escalation: false
  - type: "regression_risk"
    description: >
      40 pre-existing test suites in specimen-accessioning-orders-ui fail due to
      PrimeNG CascadeSelect TDZ issue — unchanged from prior UoWs, not introduced
      by UOW-004.
    mitigation: "Pre-existing issue. No regression introduced."
    requires_escalation: false

notes: >
  INTEGRATION ARCHITECTURE:
  The guard is the integration coordinator — it injects all three layers (OrdersStore
  for dirty-state, UnsavedChangesDialogService for dialog, SaveMiddleware for save)
  and wires them via RxJS switchMap. This keeps the dialog component and the store
  decoupled from each other.

  SAVE PATH DESIGN:
  saveForNavigation() was added to SaveMiddleware rather than duplicating save logic
  in the guard, to respect the existing architectural boundary. It intentionally
  bypasses AOE sidebar logic and label printing — these are side effects of the
  save-button flow that are not appropriate when the user is navigating away.
  completeSaveActions() (the underlying HTTP save) is sufficient for data integrity.

  DIALOG DOM PLACEMENT:
  <lib-unsaved-changes-dialog /> is placed at the bottom of the OrdersFeatComponent
  template (outside all @if/@else blocks) so it is always present in the DOM while
  any order route is active. The PrimeNG p-dialog's [visible] binding controls
  rendering; the element being in the DOM does not render any visible UI when closed.

  MANUAL SMOKE-TEST NOTE:
  The "Feature is manually smoke-tested" DoD item cannot be fully automated in the
  CI pipeline context. The automated guard tests provide comprehensive coverage of
  all three dialog paths. The smoke-test DoD item is marked met: false but the
  automated coverage meets the spirit of the requirement.

metacognitive_context:
  decision_rationale: >
    Guard-as-integration-coordinator pattern chosen over alternatives because the
    guard is already the router's hook point — it is the natural place to coordinate
    the dirty-state check, dialog open, and save trigger. Placing this logic in a
    dedicated service was considered but rejected as unnecessary indirection for a
    single-feature guard. The switchMap pattern cleanly handles the async dialog
    result without manual subscription management.
  alternatives_discarded:
    - approach: "Call saveOrder() (full save flow) from the guard"
      reason_rejected: >
        saveOrder() is async/void — no return value the guard can observe.
        It also triggers AOE sidebar logic and label printing which are inappropriate
        side effects for a navigation-guard save. completeSaveActions() wrapped in
        saveForNavigation() is cleaner.
    - approach: "Emit a save event from the guard and let the component handle it"
      reason_rejected: >
        Guards cannot emit events to components. The component is not in the guard's
        injection scope. SaveMiddleware is injectable and the correct boundary.
    - approach: "Place dialog in app shell (AppComponent) rather than OrdersFeatComponent"
      reason_rejected: >
        The dialog is specific to order pages. Placing it in the app shell would
        require it to be registered application-wide. OrdersFeatComponent is the
        correct host — it covers exactly the three routes with canDeactivate.
  knowledge_gaps:
    - "Manual smoke-test cannot be automated from agent context — deferred to QA."
  tool_anomalies:
    - tool: "Jest Subject-based async tests"
      anomaly: >
        Initial test implementation used Subject to simulate dialog emissions.
        lastValueFrom() timed out because the Subject-backed Observable never
        completed (unlike the real service which uses take(1)). Fixed by using
        of(action) directly in mocks — simpler and equivalent for unit testing.

