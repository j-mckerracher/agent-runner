uow_id: "UOW-004"
status: "complete"
implementation_summary: >
  Wired the unsaved-changes guard (UOW-002), dialog service (UOW-003), and
  dirty-state signal (UOW-001) into a complete end-to-end navigation-guard flow.

  Key changes:
  1. Added `saveForNavigation(): Promise<boolean>` to `SaveMiddleware` — performs
     the HTTP save without AOE/label side-effects, returns true on success / false
     on error. This is the "Save & Continue" bridge between the guard and the
     existing save infrastructure.
  2. Extended `unsavedChangesGuard` from a synchronous boolean return to an
     `Observable<boolean>` when dirty: injects `UnsavedChangesDialogService` and
     `SaveMiddleware`, opens the dialog via `dialogService.open()`, and pipes the
     user's action through `switchMap` — cancel→false, discard→setHasChanged(false)+true,
     save→from(saveMiddleware.saveForNavigation()).
  3. Added `<lib-unsaved-changes-dialog />` to `OrdersFeatComponent` template and
     imported `UnsavedChangesDialogComponent` — placing the dialog in the DOM for
     all order-route activations so the guard can always open it.
  4. Rewrote `unsaved-changes.guard.spec.ts` with 12 tests covering all dialog
     action paths plus clean-state fast-path and consumer-contract tests.
  All lint gates pass (0 errors, 0 warnings) across orders-ui, orders-feat, and
  rls-specimen-accessioning. Guard spec: 12/12 pass. Dirty-state spec: 14/14 pass.

librarian_queries:
  - query: "What is the OrdersStore dirty-state API (hasChanged, setHasChanged, clearOrder)?"
    confidence_received: "full"
    answer_summary: >
      store.hasChanged() reads dirty state; store.setHasChanged(false) clears it
      explicitly (used on discard path). Documented in UOW-001 impl_report via
      memory observation 2110.
  - query: "What save method is available from SaveMiddleware that can be called from a guard?"
    confidence_received: "partial"
    answer_summary: >
      No existing guard-friendly save method existed. saveOrder() is void async
      with side-effects (AOE sidebar, labels). completeSaveActions() performs HTTP
      save without UI side-effects — suitable as the basis for saveForNavigation().

librarian_exploration_summaries:
  - query: "Where is SaveMiddleware and what save methods does it expose?"
    summary_received: >
      Located at libs/pearls/specimen-accessioning/ui/orders-ui/src/lib/middleware/save.middleware.ts.
      Key methods: saveOrder() (full flow, void), completeSaveActions() (HTTP save
      only, throws on error). saveForNavigation() added by this UoW wraps
      completeSaveActions() in try/catch returning Promise<boolean>.
  - query: "Where does OrdersFeatComponent live and what imports does it need for the dialog?"
    summary_received: >
      libs/pearls/specimen-accessioning/features/orders-feat/src/lib/components/orders-feat/.
      UnsavedChangesDialogComponent already exported from @rls/specimen-accessioning/ui/orders-ui
