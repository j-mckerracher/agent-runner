    change_type: "created"
    change_summary: >
      New Jest spec file with 14 tests covering: initialization (hasChanged
      defaults false), SET behavior (modified order triggers true), CLEAR via
      setActiveOrder (save path — previously untested), CLEAR via clearOrder
      (discard path), and guard consumer contract. Also adds
      jest.mock('primeng/cascadeselect') workaround for pre-existing PrimeNG
      TDZ circular-reference issue that affected all spec files importing from
      @rls/shared/data-access/orders-data-access.

definition_of_done_status:
  - item: "Dirty-state detection mechanism identified (reuse existing) or created (new service/flag)"
    met: true
    evidence: >
      Identified: OrdersStore.hasChanged signal in orders.store.ts. Mechanism
      reused — no new service or flag created. The watchForOrderChanges effect
      (onInit) drives the signal by comparing order vs initialOrder via
      validateSaveEnablement().
  - item: "Signal set correctly when page content is modified"
    met: true
    evidence: >
      Verified by tests 'should set hasChanged to true when the current order
      differs from the initial order' and 'should keep hasChanged true when
      multiple fields are modified'. Both pass. The mechanism: setOrder() with
      a different value than initialOrder → effect fires → validateSaveEnablement
      returns true → hasChanged = true.
  - item: "Signal cleared correctly after successful save"
    met: true
    evidence: >
      Verified by two new tests in the 'hasChanged — CLEARED to false after
      successful save' describe block. setActiveOrder(savedOrder) is called
      (which is what the real save flow calls), then effects are flushed. Both
      tests pass confirming hasChanged becomes false. This test scenario was
      previously missing from the existing orders.store.spec.ts.
  - item: "Jest unit tests cover set/clear behavior for the dirty-state mechanism"
    met: true
    evidence: >
      14 Jest tests written in orders.store.dirty-state.spec.ts. All 14 pass.
      Coverage: initialization (2), SET behavior (4), CLEAR via save (3), CLEAR
      via discard (2), guard consumer contract (3).

