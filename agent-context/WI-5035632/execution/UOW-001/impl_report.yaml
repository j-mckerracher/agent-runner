uow_id: "UOW-001"
status: "complete"
implementation_summary: >
  Discovered that OrdersStore.hasChanged (an ngrx SignalStore signal) is the
  existing dirty-state mechanism for Specimen Accessioning. The signal is
  auto-computed via a watchForOrderChanges effect that compares order vs
  initialOrder using validateSaveEnablement. It is set to true when the user
  modifies the order and cleared to false after a successful save (setActiveOrder)
  or discard (clearOrder). No new service or flag was created — the existing
  mechanism is correct and sufficient. Wrote 14 new Jest tests in
  orders.store.dirty-state.spec.ts covering all DoD items; all 14 pass.

librarian_queries:
  - query: "Does an existing CanDeactivate guard or dirty-state service exist in mcs-products-mono-ui?"
    confidence_received: "full"
    answer_summary: >
      No CanDeactivate guard exists. The only guard is auth.guard.ts in
      libs/shared/core. No dedicated dirty-state service exists. The dirty-state
      is managed entirely within OrdersStore.hasChanged via the watchForOrderChanges
      effect.
  - query: "How is dirty state cleared after a successful save?"
    confidence_received: "full"
    answer_summary: >
      Two paths: (1) SaveAndRetain — calls store.updateOrder(false) then
      setActiveOrder(), which resets initialOrder = order, making the effect
      compute hasChanged = false. (2) SaveAndClear — calls store.clearOrder(),
      which explicitly sets hasChanged: false.

librarian_exploration_summaries:
  - query: "Where is the dirty-state signal in mcs-products-mono-ui?"
    summary_received: >
      OrdersStore.hasChanged in libs/pearls/specimen-accessioning/ui/orders-ui/
      src/lib/state/orders.store.ts. Signal is a boolean field in OrderState
      with initial value false. Set by watchForOrderChanges effect in onInit.
  - query: "Where is the PendingHandlerMiddleware and what does it do?"
    summary_received: >
      Located in libs/pearls/specimen-accessioning/ui/orders-ui/src/lib/
      middleware/pending-handler.middleware.ts. Handles sidebar-close pending
      changes (not menu navigation). Relevant pattern for UOW-002/003 but not
      the dirty-state signal itself.

files_modified:
