risks_identified:
  - type: "tech_debt"
    description: >
      41 pre-existing test suite failures exist in specimen-accessioning-orders-ui
      due to a PrimeNG CascadeSelect TDZ (temporal dead zone) circular-reference
      error in fesm2022 ESM. All spec files that import from
      @rls/shared/data-access/orders-data-access are affected. The team
      workaround is to comment out real test code and add dummy tests.
    mitigation: >
      Added jest.mock('primeng/cascadeselect') at the top of the new spec file
      (before imports). This prevents Jest from loading the real PrimeNG module
      and resolves the TDZ issue specifically for the new spec. The same fix
      could be applied to restore all 41 failing suites, but that is out of scope
      for UOW-001.
    requires_escalation: false

  - type: "regression_risk"
    description: >
      UOW-002 (Menu Navigation Interceptor) will need to determine whether the
      menu uses Angular Router links or custom click handlers. This decision
      affects the intercept strategy. Discovery was deferred to UOW-002.
    mitigation: >
      OrdersStore.hasChanged is a simple boolean signal — UOW-002 can consume it
      regardless of whether it uses a CanDeactivate guard or a click-handler
      intercept. No coupling risk from UOW-001.
    requires_escalation: false

notes: >
  Key discoveries for downstream UoWs (UOW-002, UOW-003, UOW-004):

  1. DIRTY STATE SIGNAL: `store.hasChanged()` — readable signal on OrdersStore
     (providedIn: 'root'). Returns boolean. Guards inject OrdersStore and read
     this signal to decide whether to block navigation.

  2. EXPLICIT SET: `store.setHasChanged(true|false)` — can be called by a guard
     or dialog to override the auto-computed value if needed.

  3. SAVE PATH clear: `store.setActiveOrder(order)` sets initialOrder = order,
     causing the watchForOrderChanges effect to compute hasChanged = false.

  4. DISCARD PATH clear: `store.clearOrder()` explicitly sets hasChanged = false
     in state.

  5. PENDING HANDLER (related, not the dirty state): PendingHandlerMiddleware
     already handles sidebar close scenarios. It exposes `notifyOfPendingChanges`
     signal. UOW-003 may reuse or extend this pattern for the menu dialog.

  6. NO CANDEACTIVATE GUARD EXISTS: UOW-002 starts from scratch. The only
     existing guard is auth.guard.ts.

  7. PRIMENG TDZ FIX: Adding `jest.mock('primeng/cascadeselect', ...)` as the
     first line of a spec file (before any imports) resolves the pre-existing
     CascadeSelect circular-reference issue for that spec. Recommend applying
     this fix to all failing spec files as a separate tech-debt task.

metacognitive_context:
  decision_rationale: >
    Rather than creating a new dirty-state service, the existing OrdersStore.hasChanged
    signal was reused. This is the correct choice per the DoD ("reuse existing")
    and avoids introducing a competing dirty-state source that downstream guards
    would need to reconcile. The existing PendingHandlerMiddleware was inspected
    but intentionally NOT extended — it handles sidebar-close scenarios and its
    patterns are relevant to UOW-003/004 but not T1.
  alternatives_discarded:
    - approach: "Create a new DirtyStateService with its own BehaviorSubject"
      reason_rejected: >
        OrdersStore.hasChanged already exists and is the authoritative source.
        Creating a parallel service would cause duplication and potential
        desync. The DoD explicitly says 'reuse existing if found'.
    - approach: "Extend PendingHandlerMiddleware with a menu-navigation handler"
      reason_rejected: >
        T1 scope is dirty-state detection only, not interception. PendingHandlerMiddleware
        is the right place for interception logic (T2/T4), not signal tracking.
        Mixing concerns here would create scope creep.
    - approach: "Add tests to existing orders.store.spec.ts"
      reason_rejected: >
        The existing spec is 2762 lines. Adding more tests there would increase
        maintenance burden. A dedicated spec file scoped to the navigation-guard
        story (WI-5035632) is clearer and keeps the test intent visible.
  knowledge_gaps:
    - "Menu technology (Angular Router vs custom handlers) still unknown — deferred to UOW-002"
    - "Which pages beyond Specimen Accessioning orders page need the guard — deferred to UOW-004"
  tool_anomalies:
    - tool: "jest/jest-preset-angular"
      anomaly: >
        PrimeNG fesm2022 CascadeSelect module has a circular reference that
        causes TDZ errors when Jest transforms ESM. Affects 41+ existing spec
        files. Fixed by jest.mock('primeng/cascadeselect') before imports.

