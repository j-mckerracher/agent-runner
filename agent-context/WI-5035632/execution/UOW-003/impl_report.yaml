implementation_summary: >
  Created the UnsavedChangesDialogComponent and UnsavedChangesDialogService for
  WI-5035632 (T3 — Unsaved Changes Dialog Component). The service exposes an
  Observable-based async API (`open(): Observable<UnsavedChangesDialogAction>`)
