risks_identified:
  - type: "tech_debt"
    description: >
      The UnsavedChangesDialogComponent must be placed in the OrdersFeatComponent
      template (or app shell) so it is in the DOM when any order route is active.
      This placement is deferred to UOW-004 (integration). Until then, the dialog
      component is implemented but not yet rendered anywhere in the app.
    mitigation: >
      UOW-004 specification already accounts for this — it wires guard + dialog +
      save/discard outcomes. The component and service are ready for consumption.
    requires_escalation: false

notes: >
  Implementation follows the session-timeout-warning-modal pattern (p-dialog with
  pTemplate="header"/"footer", service-driven visibility signal). The service
  pattern (Subject + take(1)) is canonical for single-use async dialog decisions.

  No existing unsaved-changes dialog was found in the codebase — implementation
  is wholly new.

  Downstream API contract for UOW-004:
    1. Inject UnsavedChangesDialogService in the unsavedChangesGuard.
    2. Replace `return !store.hasChanged()` with:
         return unsavedChangesDialogService.open().pipe(
           switchMap(action => {
             if (action === 'save') { /* trigger save, return observable of nav decision */ }
             if (action === 'discard') { store.clearOrder(); return of(true); }
             return of(false); // cancel
           })
         );
    3. Add <lib-unsaved-changes-dialog /> to the OrdersFeatComponent template.
    4. No changes needed to canDeactivate route registration in app.routes.ts —
       the guard function signature stays the same; only the return type changes
       from boolean to Observable<boolean>.

metacognitive_context:
  decision_rationale: >
    Service + component pattern chosen over a pure output-event component because
    the navigation guard (UOW-004) needs to receive the dialog result as an
    Observable it can await — a direct component output would require wiring through
    the feature component host, adding unnecessary coupling. The service decouples
    the guard from the component's DOM placement. Subject + take(1) provides a
    clean single-emission Observable that auto-completes, preventing memory leaks.
  alternatives_discarded:
    - approach: "Pure component with @output events for each action"
      reason_rejected: >
        The navigation guard cannot easily subscribe to component output events —
        it would require the feature component to expose a callback or use a shared
        subject anyway. Service pattern is cleaner.
    - approach: "PrimeNG ConfirmDialog / ConfirmationService"
      reason_rejected: >
        ConfirmationService only supports 2-action confirm/reject pattern; our dialog
        needs three distinct actions. Custom component was necessary.
    - approach: "headless p-dialog template (matching paperwork-label-dialog)"
      reason_rejected: >
        Headless template requires more custom CSS to replicate the standard p-dialog
        header/footer structure. The standard pTemplate="header"/"footer" approach
        (matching session-timeout-warning-modal) inherits more design-system styling
        and requires no bespoke layout overrides.
  knowledge_gaps:
    - "Whether UOW-004 should place <lib-unsaved-changes-dialog> in the app shell or OrdersFeatComponent — left as a UOW-004 decision."
  tool_anomalies: []

