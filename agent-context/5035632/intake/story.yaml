change_id: '5035632'
title: Navigating away from page through menu
description: As a user, I need the unsaved items dialog box to show if I navigate away using the menu
acceptance_criteria:
  AC1: If the page is altered and unsaved, the unsaved changes dialog appears if I navigate away from the page using the menu
  AC2: If the page is altered and unsaved, clicking on the Triage Worklist pops up the unsaved changes dialog box
  AC3: If the page is altered and unsaved, clicking on the Specimen Accessioning pops up the unsaved changes dialog box
examples:
- name: Menu navigation with unsaved page changes
  given: The current page has altered, unsaved data.
  when: The user navigates away using the application menu.
  then: The unsaved changes dialog appears before navigation continues.
  source: System.Description AC1
- name: Triage Worklist menu navigation
  given: The current page has altered, unsaved data.
  when: The user clicks the Triage Worklist menu item.
  then: The unsaved changes dialog box appears.
  source: System.Description AC2
- name: Specimen Accessioning menu navigation
  given: The current page has altered, unsaved data.
  when: The user clicks the Specimen Accessioning menu item.
  then: The unsaved changes dialog box appears.
  source: System.Description AC3
constraints:
- Use the "Order Changed" modal provided in the story description/user context for the unsaved changes warning; do not invent
  a separate dialog pattern.
- The dialog trigger is limited to pages with altered, unsaved data.
- Menu-driven navigation away from the current page must be covered, including Triage Worklist and Specimen Accessioning menu
  entries.
- Acceptance criteria were normalized from lines prefixed "AC -" in System.Description because no dedicated Acceptance Criteria
  field was returned by the ADO CLI.
