change_id: WI-5043919
title: "Update api to have graceful shutdown"
description: "Update all APIs to have a graceful shutdown."
acceptance_criteria:
  AC1: "rls-orders-cnsmr-api and rls-docgen-system-api implement graceful shutdown behavior appropriate for the Cloud Run container lifecycle on .NET 8/alpine."
  AC2: "When the container receives SIGTERM, each API uses host lifetime shutdown handling to stop taking new work and allow in-flight requests or processing to complete or cancel cleanly before process exit."
  AC3: "Each API flushes Serilog sinks during shutdown and the shutdown path completes without introducing unhandled exceptions or abrupt process termination."
  AC4: "The work item or implementation notes clearly identify any additional APIs that still need the same graceful shutdown pattern, including the currently out-of-scope follow-up for rls-orders-orch-api and rls-orders-data-api."
  AC5: "No regressions introduced."
ado_provenance:
  id: 5043919
  url: "https://dev.azure.com/mclm/f25fdc8e-bb30-470e-b590-3b9d0576193f/_apis/wit/workItems/5043919"
raw_input:
  id: 5043919
  fields:
    System.Title: "Update api to have graceful shutdown"
    System.Description: "Update all APIs to have a graceful shutdown."
    Microsoft.VSTS.Common.AcceptanceCriteria: "<ul><li><code>rls-orders-cnsmr-api</code> and <code>rls-docgen-system-api</code> implement graceful shutdown behavior appropriate for the Cloud Run container lifecycle on .NET 8/alpine. </li><li>When the container receives <code>SIGTERM</code>, each API uses host lifetime shutdown handling to stop taking new work and allow in-flight requests or processing to complete or cancel cleanly before process exit. </li><li>Each API flushes Serilog sinks during shutdown and the shutdown path completes without introducing unhandled exceptions or abrupt process termination. </li><li>The work item or implementation notes clearly identify any additional APIs that still need the same graceful shutdown pattern, including the currently out-of-scope follow-up for <code>rls-orders-orch-api</code> and <code>rls-orders-data-api</code> </li><li><code>No regressions introduced.</code> </li> </ul>"
