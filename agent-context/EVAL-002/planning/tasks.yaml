metacognitive_context:
  decision_rationale: |
    A 7-task plan separates clarification, design, implementation, wiring, testing, edge-case coverage, and handoff. This enforces precondition checks and schema creation early (reducing mis-implementation risk) while grouping related work so implementers can produce micro-tasks as needed.
  alternatives_discarded:
    - approach: "Single-phase implement-and-test"
      reason_rejected: "Conflates design and implementation; raises risk of incorrect assumptions and violates precondition rules."
    - approach: "Many micro-tasks per file change"
      reason_rejected: "Too low-level for Task Generator; prefer broader tasks (3-8) that are traceable to ACs."
  knowledge_gaps:
